<div class="w-full h-screen">
  <main class="flex justify-center mx-auto w-full">
    <!-- Navigation -->
    @if (!(screenSize.isHandset$ | async)) {
      <App-navigation />
    }

    <!-- Posts section -->
    <div class="min-w-[420px] lg:max-w-[600px] w-full">
      <App-post-feed />
    </div>

    <!-- Job listings -->
    @if (screenSize.isWeb$ | async) {
      <div class="max-w-[250px] w-full">
        <App-job-listings />
      </div>
    }
  </main>
</div>
